# ROS2 Controller Configuration for M1013 + Robotiq Hand-E

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/JointGroupPositionController

# Joint State Broadcaster - publishes all joint states
joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - hande_left_finger_joint

# Arm Controller - 6-DOF trajectory control
arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: true
    open_loop_control: true
    allow_integration_in_goal_trajectories: true

# Gripper Controller - simple box gripper, left finger only.
# Right finger is a FIXED decorative box on +X side of palm. Left finger
# slides along +X via this single prismatic joint (range 0..0.030).
# Commands published as std_msgs/Float64MultiArray on
# /gripper_controller/commands → forwarded straight to IgnitionSystem
# position interface.
gripper_controller:
  ros__parameters:
    joints:
      - hande_left_finger_joint
    interface_name: position
