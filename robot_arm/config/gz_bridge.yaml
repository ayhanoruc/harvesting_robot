# ROS-Gazebo Bridge Configuration for Ignition Fortress
# Maps Ignition Transport topics to ROS2 topics

# Clock (required for use_sim_time)
- ros_topic_name: "clock"
  gz_topic_name: "clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS

# Camera info (color)
- ros_topic_name: "camera/color/camera_info"
  gz_topic_name: "camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS

# Camera info (depth) - same camera_info as color
- ros_topic_name: "camera/depth/camera_info"
  gz_topic_name: "camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS

# Note: Image topics are handled by ros_gz_image bridge for efficiency
# - /camera/image -> /camera/color/image_raw
# - /camera/depth_image -> /camera/depth/image_raw
