<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">
  <rect width="1000" height="820" fill="white"/>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="ar-sky" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#0284c7"/>
    </marker>
    <marker id="ar-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- ===================== Title ===================== -->
  <text x="500" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">
    RoboCot — Software Architecture
  </text>
  <text x="500" y="48" text-anchor="middle" font-size="11" fill="#6b7280">
    ROS 2 Humble · layered pipeline · service-call edges
  </text>

  <!-- ===================== Touchpoints (top) ===================== -->
  <g>
    <rect x="60" y="70" width="170" height="42" rx="6" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
    <text x="145" y="88" text-anchor="middle" font-weight="700" fill="#166534">control_panel</text>
    <text x="145" y="102" text-anchor="middle" fill="#15803d" font-size="9.5">PyQt5 UI · orchestrator pkg</text>

    <rect x="250" y="70" width="240" height="42" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="370" y="88" text-anchor="middle" font-weight="600" fill="#334155">ros2 launch (3 terminals)</text>
    <text x="370" y="102" text-anchor="middle" fill="#64748b" font-size="9.5">husky_orchard_demo · moveit · harvester_modules</text>

    <rect x="510" y="70" width="170" height="42" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="595" y="88" text-anchor="middle" font-weight="600" fill="#334155">ros2 run / service call</text>
    <text x="595" y="102" text-anchor="middle" fill="#64748b" font-size="9.5">CLI bring-up</text>
  </g>
  <text x="370" y="130" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">all three converge on /row_nav/run</text>

  <!-- ============= Layer-3 row_navigator ============= -->
  <g>
    <text x="40" y="170" font-size="10" font-weight="700" fill="#9ca3af">LEVEL 3</text>
    <rect x="320" y="150" width="360" height="60" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="2"/>
    <text x="500" y="170" text-anchor="middle" font-weight="700" fill="white" font-size="13">row_navigator</text>
    <text x="500" y="186" text-anchor="middle" fill="#dcfce7" font-size="10">drive Husky to each scout pose · recalibrate odom · trigger cluster harvest</text>
    <text x="500" y="200" text-anchor="middle" fill="#dcfce7" font-size="9">exposes:  /row_nav/run · publishes:  /cmd_vel · /row_nav/status</text>
  </g>

  <!-- arrow L3 -> L2 -->
  <line x1="500" y1="210" x2="500" y2="248" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="508" y="232" font-size="10" fill="#475569" font-family="monospace">/cluster_harvester/run</text>

  <!-- ============= Layer-2 cluster_harvester ============= -->
  <g>
    <text x="40" y="270" font-size="10" font-weight="700" fill="#9ca3af">LEVEL 2</text>
    <rect x="320" y="250" width="360" height="60" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="2"/>
    <text x="500" y="270" text-anchor="middle" font-weight="700" fill="white" font-size="13">cluster_harvester</text>
    <text x="500" y="286" text-anchor="middle" fill="#dcfce7" font-size="10">scan → match detections to YAML boll ids → sort by reach → pick batch</text>
    <text x="500" y="300" text-anchor="middle" fill="#dcfce7" font-size="9">re-scan loop ·  cap = max_iterations  ·  publishes:  /cluster_harvester/status</text>
  </g>

  <!-- arrows L2 -> L1 -->
  <line x1="430" y1="310" x2="280" y2="345" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="570" y1="310" x2="720" y2="345" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="290" y="332" font-size="10" fill="#475569" font-family="monospace">/cluster_scan/run</text>
  <text x="615" y="332" font-size="10" fill="#475569" font-family="monospace">/simple_harvest/start</text>

  <!-- ============= Layer-1 ============= -->
  <text x="40" y="370" font-size="10" font-weight="700" fill="#9ca3af">LEVEL 1</text>

  <g>
    <rect x="115" y="350" width="285" height="76" rx="6" fill="#0d9488" stroke="#0f766e" stroke-width="2"/>
    <text x="257" y="370" text-anchor="middle" font-weight="700" fill="white" font-size="13">cluster_scanner</text>
    <text x="257" y="385" text-anchor="middle" fill="#ccfbf1" font-size="10">15-pose pan/tilt sweep · per-pose YOLO + 3D</text>
    <text x="257" y="399" text-anchor="middle" fill="#ccfbf1" font-size="10">dedup 5 cm · gap-rule cluster bbox</text>
    <text x="257" y="416" text-anchor="middle" fill="#ccfbf1" font-size="9">writes:  yolo_output/cluster_scan_*.json + .png</text>
  </g>

  <g>
    <rect x="600" y="350" width="285" height="76" rx="6" fill="#0d9488" stroke="#0f766e" stroke-width="2"/>
    <text x="742" y="370" text-anchor="middle" font-weight="700" fill="white" font-size="13">simple_cluster_harvester</text>
    <text x="742" y="385" text-anchor="middle" fill="#ccfbf1" font-size="10">per-boll pick: go_to_pose · mock close · carry</text>
    <text x="742" y="399" text-anchor="middle" fill="#ccfbf1" font-size="10">go_to_reservoir · mock open · drop teleport</text>
    <text x="742" y="416" text-anchor="middle" fill="#ccfbf1" font-size="9">reservoir-carry thread keeps dropped bolls glued</text>
  </g>

  <!-- arrows L1 -> L0 -->
  <line x1="180" y1="426" x2="120" y2="476" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="280" y1="426" x2="290" y2="476" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="80" y="455" font-size="9" fill="#475569" font-family="monospace">/yolo/detect</text>
  <text x="300" y="455" font-size="9" fill="#475569" font-family="monospace">/pixel_to_3d</text>

  <line x1="680" y1="426" x2="475" y2="476" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="780" y1="426" x2="675" y2="476" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="850" y1="426" x2="870" y2="476" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="495" y="455" font-size="9" fill="#475569" font-family="monospace">/go_to_pose</text>
  <text x="495" y="468" font-size="9" fill="#475569" font-family="monospace">/go_to_reservoir</text>
  <text x="690" y="455" font-size="9" fill="#475569" font-family="monospace">/gripper/{open,close}</text>

  <!-- ============= Layer-0 ============= -->
  <text x="40" y="495" font-size="10" font-weight="700" fill="#9ca3af">LEVEL 0</text>

  <g>
    <rect x="50" y="480" width="170" height="68" rx="6" fill="#15803d" stroke="#14532d" stroke-width="2"/>
    <text x="135" y="500" text-anchor="middle" font-weight="700" fill="white" font-size="12">real_yolo_detector</text>
    <text x="135" y="514" text-anchor="middle" fill="#dcfce7" font-size="9.5">YOLO11 (best.pt) on</text>
    <text x="135" y="526" text-anchor="middle" fill="#dcfce7" font-size="9.5">/camera/color/image_raw</text>
    <text x="135" y="540" text-anchor="middle" fill="#bbf7d0" font-size="9">srv:  /yolo/detect{,_clusters}</text>
  </g>

  <g>
    <rect x="230" y="480" width="170" height="68" rx="6" fill="#15803d" stroke="#14532d" stroke-width="2"/>
    <text x="315" y="500" text-anchor="middle" font-weight="700" fill="white" font-size="12">depth_processor</text>
    <text x="315" y="514" text-anchor="middle" fill="#dcfce7" font-size="9.5">K back-project + 5×5 median</text>
    <text x="315" y="526" text-anchor="middle" fill="#dcfce7" font-size="9.5">TF camera_optical→world</text>
    <text x="315" y="540" text-anchor="middle" fill="#bbf7d0" font-size="9">srv:  /pixel_to_3d</text>
  </g>

  <g>
    <rect x="410" y="480" width="200" height="68" rx="6" fill="#7c3aed" stroke="#5b21b6" stroke-width="2"/>
    <text x="510" y="500" text-anchor="middle" font-weight="700" fill="white" font-size="12">arm_commander</text>
    <text x="510" y="514" text-anchor="middle" fill="#ede9fe" font-size="9.5">IK (compute_ik) + direct</text>
    <text x="510" y="526" text-anchor="middle" fill="#ede9fe" font-size="9.5">JointTrajectory publish</text>
    <text x="510" y="540" text-anchor="middle" fill="#ddd6fe" font-size="9">srv:  /go_to_pose · /go_to_reservoir · /go_to_named</text>
  </g>

  <g>
    <rect x="625" y="480" width="170" height="68" rx="6" fill="#7c3aed" stroke="#5b21b6" stroke-width="2"/>
    <text x="710" y="500" text-anchor="middle" font-weight="700" fill="white" font-size="12">gripper_controller</text>
    <text x="710" y="514" text-anchor="middle" fill="#ede9fe" font-size="9.5">Float64MultiArray → controller</text>
    <text x="710" y="526" text-anchor="middle" fill="#ede9fe" font-size="9.5">poll /joint_states for settle</text>
    <text x="710" y="540" text-anchor="middle" fill="#ddd6fe" font-size="9">srv:  /gripper/open · /gripper/close</text>
  </g>

  <g>
    <rect x="810" y="480" width="140" height="68" rx="6" fill="#16a34a" stroke="#14532d" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="880" y="500" text-anchor="middle" font-weight="700" fill="white" font-size="12">cv_boll_detector</text>
    <text x="880" y="514" text-anchor="middle" fill="#dcfce7" font-size="9">classical CV alternative</text>
    <text x="880" y="526" text-anchor="middle" fill="#dcfce7" font-size="9">same /yolo/detect API</text>
    <text x="880" y="540" text-anchor="middle" fill="#bbf7d0" font-size="9">plug-and-play swap</text>
  </g>

  <!-- arrows L0 -> external -->
  <line x1="510" y1="548" x2="380" y2="613" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#ar-purple)"/>
  <text x="335" y="585" font-size="9" fill="#7c3aed" font-family="monospace">move_action</text>
  <text x="335" y="596" font-size="9" fill="#7c3aed" font-family="monospace">/compute_ik</text>

  <line x1="510" y1="548" x2="620" y2="613" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#ar-purple)"/>
  <text x="600" y="585" font-size="9" fill="#7c3aed" font-family="monospace">/arm_controller/</text>
  <text x="600" y="596" font-size="9" fill="#7c3aed" font-family="monospace">joint_trajectory</text>

  <line x1="710" y1="548" x2="710" y2="613" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#ar-purple)"/>
  <text x="720" y="585" font-size="9" fill="#7c3aed" font-family="monospace">/gripper_controller/</text>
  <text x="720" y="596" font-size="9" fill="#7c3aed" font-family="monospace">commands</text>

  <line x1="225" y1="548" x2="225" y2="613" stroke="#0284c7" stroke-width="1.4" marker-end="url(#ar-sky)"/>
  <text x="235" y="585" font-size="9" fill="#0284c7" font-family="monospace">/camera/color/image_raw</text>
  <text x="235" y="596" font-size="9" fill="#0284c7" font-family="monospace">/camera/depth/{image_raw,camera_info}</text>

  <!-- ============= External (Gazebo + MoveIt + ros2_control) ============= -->
  <text x="40" y="635" font-size="10" font-weight="700" fill="#9ca3af">EXTERNAL</text>

  <g>
    <rect x="60" y="615" width="280" height="80" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <text x="200" y="635" text-anchor="middle" font-weight="700" fill="#1e3a8a" font-size="12">Gazebo Sim · Fortress 6.16</text>
    <text x="200" y="652" text-anchor="middle" fill="#1d4ed8" font-size="10">DiffDrive plugin · RGB-D sensor</text>
    <text x="200" y="666" text-anchor="middle" fill="#1d4ed8" font-size="10">gz_ros2_control · physics step 5 ms</text>
    <text x="200" y="684" text-anchor="middle" fill="#1e40af" font-size="9">publishes: /odom · /tf · /joint_states · /camera/*</text>
  </g>

  <g>
    <rect x="360" y="615" width="260" height="80" rx="6" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
    <text x="490" y="635" text-anchor="middle" font-weight="700" fill="#4c1d95" font-size="12">MoveIt 2 (move_group)</text>
    <text x="490" y="652" text-anchor="middle" fill="#5b21b6" font-size="10">OMPL RRTstar · KDL IK</text>
    <text x="490" y="666" text-anchor="middle" fill="#5b21b6" font-size="10">planning_scene_monitor</text>
    <text x="490" y="684" text-anchor="middle" fill="#5b21b6" font-size="9">action: move_action · srv: /compute_ik</text>
  </g>

  <g>
    <rect x="640" y="615" width="310" height="80" rx="6" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
    <text x="795" y="635" text-anchor="middle" font-weight="700" fill="#4c1d95" font-size="12">ros2_control controllers</text>
    <text x="795" y="652" text-anchor="middle" fill="#5b21b6" font-size="10">arm_controller (JointTrajectoryController, 6 joints)</text>
    <text x="795" y="666" text-anchor="middle" fill="#5b21b6" font-size="10">gripper_controller (Float64MultiArray, 1 joint)</text>
    <text x="795" y="684" text-anchor="middle" fill="#5b21b6" font-size="9">joint_state_broadcaster → /joint_states</text>
  </g>

  <!-- Interfaces / harvester_interfaces note (side bar) -->
  <g>
    <rect x="60" y="710" width="890" height="50" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="75" y="730" font-weight="700" fill="#334155" font-size="11">harvester_interfaces (custom msg/srv)</text>
    <text x="75" y="747" fill="#475569" font-size="10" font-family="monospace">
      msg:  BoundingBox · DetectedCluster      srv:  YoloDetect · PixelTo3D · HarvestBoll · FocusFromPixel · FocusFromPosition · GetDetectedClusters · RunDetectionPipeline
    </text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 780)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#16a34a"/>
    <text x="18" y="10" font-size="10" fill="#334155">orchestrator (L2/L3)</text>

    <rect x="160" y="0" width="12" height="12" rx="2" fill="#0d9488"/>
    <text x="178" y="10" font-size="10" fill="#334155">orchestrator (L1)</text>

    <rect x="305" y="0" width="12" height="12" rx="2" fill="#15803d"/>
    <text x="323" y="10" font-size="10" fill="#334155">orchestrator (L0)</text>

    <rect x="450" y="0" width="12" height="12" rx="2" fill="#7c3aed"/>
    <text x="468" y="10" font-size="10" fill="#334155">robot_arm_moveit_config / external</text>

    <rect x="700" y="0" width="12" height="12" rx="2" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
    <text x="718" y="10" font-size="10" fill="#334155">simulator</text>
  </g>
</svg>
