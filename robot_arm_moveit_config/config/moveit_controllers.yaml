# MoveIt only drives the arm. The gripper is teleport-only (no trajectory),
# commanded directly by orchestrator/gripper_controller_node via the
# /gripper/open and /gripper/close services — not through MoveIt.
moveit_simple_controller_manager:
  controller_names:
    - arm_controller

  arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
