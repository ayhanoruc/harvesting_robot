# Joint Limits Override
#
# These limits override or supplement what's in the URDF.
# MoveIt uses these for trajectory generation.
#
# has_velocity_limits: whether to enforce velocity limits
# max_velocity: maximum joint velocity (rad/s for revolute, m/s for prismatic)
# has_acceleration_limits: whether to enforce acceleration limits
# max_acceleration: maximum joint acceleration

joint_limits:
  slider_joint:
    has_velocity_limits: true
    max_velocity: 0.5           # m/s (prismatic joint)
    has_acceleration_limits: true
    max_acceleration: 1.0       # m/s^2

  arm_joint:
    has_velocity_limits: true
    max_velocity: 1.0           # rad/s (revolute joint)
    has_acceleration_limits: true
    max_acceleration: 2.0       # rad/s^2
